name: 🤖 Keep Bot Alive

on:
  schedule:
    - cron: '*/5 * * * *'  # запуск кожні 5 хвилин
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  ping-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 🔍 Ping Replit Bot
        id: ping
        run: |
          echo "🔄 Початок перевірки бота..."
          echo "⏰ Час: $(date)"
          echo "🌐 URL: ${{ secrets.REPLIT_URL }}"

          # Перший пінг
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${{ secrets.REPLIT_URL }}/health")
          if [ -z "$HTTP_CODE" ]; then
            HTTP_CODE="000"
          fi
          echo "📊 HTTP статус: $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Бот працює нормально!"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Бот не відповідає! Код: $HTTP_CODE"
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          fi

      - name: ⏳ Повторна спроба через 30 секунд (якщо перший пінг не вдався)
        if: steps.ping.outputs.status == 'failed'
        id: retry
        run: |
          echo "⏳ Чекаємо 30 секунд перед повторною спробою..."
          sleep 30

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${{ secrets.REPLIT_URL }}/health")
          if [ -z "$HTTP_CODE" ]; then
            HTTP_CODE="000"
          fi
          echo "📊 HTTP статус повторної спроби: $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Бот відновився після повторної спроби!"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Бот все ще не працює. Код: $HTTP_CODE"
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: 📱 Надіслати Telegram повідомлення при падінні
        if: steps.retry.outputs.status == 'failed' || steps.ping.outputs.status == 'failed'
        run: |
          MESSAGE="🔴 УВАГА! Бот не відповідає!%0A"
          if [ -n "${{ steps.retry.outputs.http_code }}" ]; then
            HTTP=${{ steps.retry.outputs.http_code }}
          else
            HTTP=${{ steps.ping.outputs.http_code }}
          fi
          MESSAGE="${MESSAGE}📊 HTTP статус: $HTTP%0A"
          MESSAGE="${MESSAGE}⏰ Час: $(date +'%Y-%m-%d %H:%M:%S')%0A"
          MESSAGE="${MESSAGE}🔗 URL: ${{ secrets.REPLIT_URL }}"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MESSAGE" \
            -d "parse_mode=HTML"

      - name: 📱 Надіслати Telegram повідомлення про відновлення
        if: steps.ping.outputs.status == 'failed' && steps.retry.outputs.status == 'success'
        run: |
          MESSAGE="✅ Бот відновлено після падіння!%0A"
          MESSAGE="${MESSAGE}⏰ Час: $(date +'%Y-%m-%d %H:%M:%S')%0A"
          MESSAGE="${MESSAGE}🔗 URL: ${{ secrets.REPLIT_URL }}"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MESSAGE" \
            -d "parse_mode=HTML"
