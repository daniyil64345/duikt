name: 🚀 Bot Monitor & Keep Alive

on:
  schedule:
    - cron: '*/10 * * * *'  # Кожні 10 хвилин
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Check & Ping Bot
        id: check
        run: |
          BOT_URL="https://your-service.onrender.com/health"
          
          # Пінгуємо
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BOT_URL" || echo "000")
          
          echo "status=$HTTP_STATUS" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
          
          # Результат
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "result=✅ Працює" >> $GITHUB_OUTPUT
          else
            echo "result=🔴 НЕ ПРАЦЮЄ" >> $GITHUB_OUTPUT
          fi

      - name: 📤 Send Telegram Notification
        run: |
          TELEGRAM_BOT_TOKEN="${{ secrets.MONITOR_BOT_TOKEN }}"
          CHAT_ID="${{ secrets.ADMIN_CHAT_ID }}"
          
          # Формуємо повідомлення
          if [ "${{ steps.check.outputs.status }}" = "200" ]; then
            EMOJI="✅"
            STATUS_TEXT="Бот працює нормально"
          else
            EMOJI="🔴"
            STATUS_TEXT="УВАГА! Бот магазину не працює!"
          fi
          
          MESSAGE="${EMOJI} ${STATUS_TEXT}
          📊 HTTP статус: ${{ steps.check.outputs.status }}
          ⏰ Час: ${{ steps.check.outputs.timestamp }}
          🔗 URL: https://your-service.onrender.com
          
          Результат: ${{ steps.check.outputs.result }}"
          
          # Відправляємо тільки якщо бот не працює
          if [ "${{ steps.check.outputs.status }}" != "200" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${CHAT_ID}" \
              -d text="${MESSAGE}"
          fi
